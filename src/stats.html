<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>manturón stats</title>
  <link rel="stylesheet" href="/static/css/styles.css">
  <style>
    body {
      min-height: 100vh;
    }

    .stats-page {
      width: min(920px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 40px 0 96px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin: 28px 0;
    }

    .stats-card,
    .stats-list {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 18px;
      padding: 18px;
    }

    .stats-label {
      margin: 0 0 8px;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.7;
    }

    .stats-value {
      margin: 0;
      font-size: clamp(1.8rem, 3vw, 2.6rem);
    }

    .stats-list {
      margin-top: 18px;
    }

    .stats-list ol {
      margin: 14px 0 0;
      padding-left: 20px;
    }

    .stats-list li + li {
      margin-top: 10px;
    }

    .stats-meta {
      opacity: 0.7;
      font-size: 0.92rem;
    }
  </style>
</head>
<body>
  <main class="stats-page">
    <header>
      <p class="player-label">analítica</p>
      <h1>manturón</h1>
      <p class="stats-meta" id="stats-updated">cargando datos...</p>
      <p class="stats-meta" id="stats-debug" hidden></p>
    </header>

    <section class="stats-grid" aria-label="Resumen de actividad">
      <article class="stats-card">
        <p class="stats-label">Visitas</p>
        <p class="stats-value" id="stats-visits">0</p>
      </article>
      <article class="stats-card">
        <p class="stats-label">Reproducciones</p>
        <p class="stats-value" id="stats-play-starts">0</p>
      </article>
      <article class="stats-card">
        <p class="stats-label">Sesiones con música</p>
        <p class="stats-value" id="stats-sessions-with-music">0</p>
      </article>
    </section>

    <section class="stats-list" aria-labelledby="top-tracks-heading">
      <h2 id="top-tracks-heading">Canciones más reproducidas</h2>
      <ol id="stats-top-tracks"></ol>
    </section>
  </main>

  <script src="/static/js/stats.js"></script>
</body>
</html>
